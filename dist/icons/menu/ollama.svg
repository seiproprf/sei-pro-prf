<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="15" fill="#0f0f0f"/>
  <!-- Corpo da llama simplificado -->
  <!-- Pescoço/corpo -->
  <rect x="36" y="52" width="28" height="30" rx="8" fill="#f5f5f5"/>
  <!-- Cabeça -->
  <ellipse cx="50" cy="42" rx="16" ry="17" fill="#f5f5f5"/>
  <!-- Orelha esquerda -->
  <ellipse cx="37" cy="28" rx="5" ry="9" fill="#f5f5f5" transform="rotate(-20 37 28)"/>
  <!-- Orelha direita -->
  <ellipse cx="63" cy="28" rx="5" ry="9" fill="#f5f5f5" transform="rotate(20 63 28)"/>
  <!-- Olho esquerdo -->
  <circle cx="44" cy="40" r="3" fill="#0f0f0f"/>
  <!-- Olho direito -->
  <circle cx="56" cy="40" r="3" fill="#0f0f0f"/>
  <!-- Nariz -->
  <ellipse cx="50" cy="50" rx="6" ry="3.5" fill="#d0d0d0"/>
</svg>
